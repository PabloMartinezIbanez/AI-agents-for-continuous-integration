services:

  # Jenkins + ngrok
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins-ngrok
    image: jenkins-ngrok:2.541.1-jdk25
    restart: on-failure
    ports:
      - "8080:8080" # Jenkins UI
      - "5678:5678" # ngrok tunnel
      - "50000:50000" # JNLP agents
    volumes:
      - jenkins_home:/var/jenkins_home
    env_file:
      - .env # NGROK_AUTHTOKEN and other sensitive variables
    environment:
      JENKINS_OPTS: "--httpPort=8080"
      NGROK_REGION: "eu"
      # Internal URL so pipelines can reach SonarQube by service name
      SONAR_HOST_URL: "http://sonarqube:9000"
    networks:
      - sonarnet # required so Jenkins can reach SonarQube
    entrypoint: [ "/usr/local/bin/entrypoint.sh" ]
    depends_on:
      - sonarqube

  # SonarQube
  sonarqube:
    container_name: sonarqube
    image: sonarqube:26.3.0.120487-community
    ports:
      - "9000:9000"
    networks:
      - sonarnet
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db:5432/sonar # corrected (it was postgresq1 with a "1")
      - SONAR_JDBC_USERNAME=${SONARQUBE_JDBC_USERNAME}
      - SONAR_JDBC_PASSWORD=${SONARQUBE_JDBC_PASSWORD}
    volumes:
      - sonarqube_conf:/opt/sonarqube/conf
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_bundled-plugins:/opt/sonarqube/lib/bundled-plugins
    depends_on:
      - db

  # PostgreSQL (SonarQube backend)
  db:
    container_name: postgresql
    image: postgres:15.17
    networks:
      - sonarnet
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=sonar
    volumes:
      - postgresql_data:/var/lib/postgresql/data

networks:
  sonarnet:
    driver: bridge

volumes:
  jenkins_home:
    name: jenkins_home_data
  sonarqube_conf:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_bundled-plugins:
  postgresql_data:
